version: 2
updates:
  # Track upstream typie (upstream/typie submodule). Bumps land as PRs that
  # run CI, so the drift-guard tests gate any contract-breaking change.
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "submodule"
    labels:
      - "dependencies"
      - "upstream"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
